databases:
  - name: rainwater-db
    plan: basic-256mb
    databaseName: rainwater
    user: rainwater
    region: frankfurt

services:
  - type: web
    name: rainwater-sayim
    runtime: python
    plan: starter
    region: frankfurt
    autoDeploy: true
    buildCommand: |
      set -e
      cd frontend
      npm ci || npm install
      npm run build
      cd ..
      pip install --upgrade pip
      pip install -r backend/requirements.txt
    startCommand: |
      cd backend
      alembic upgrade head
      exec uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /api/ready
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rainwater-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PIN
        sync: false
      - key: STATIC_DIR
        value: /opt/render/project/src/frontend/dist
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: NODE_VERSION
        value: "20.18.0"
